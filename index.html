    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence, browserSessionPersistence, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCY72ZAP2cJ4fCMrBK66TZ9X784ERljjJE",
            authDomain: "nw-pt-2026.firebaseapp.com",
            projectId: "nw-pt-2026",
            storageBucket: "nw-pt-2026.firebasestorage.app",
            messagingSenderId: "1017871862651",
            appId: "1:1017871862651:web:d788ee68a3d66c62e1cbde",
            measurementId: "G-44NK683DKY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'nw-pt-2026';
        const ROLE_DEFS = {
            '系統管理員': { level: 4, label: '系統管理員' },
            '業主': { level: 3, label: '業主' },
            '幹部': { level: 2, label: '幹部' },
            '保全': { level: 1, label: '保全' }
        };
        const BOOTSTRAP_ADMIN_EMAIL = 'nwapp.eason@gmail.com';
        const LOGIN_PREF_KEY = 'nw_login_pref_v1';
        const PROFILE_AVATAR_KEY_PREFIX = 'nw_profile_avatar_v1_';

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }

        let currentUserData = null;
        let activeTab = 'ownerList';
        let dbScope = 'artifacts';
        let hasDbAccess = true;

        function userDocRef(uid) {
            return dbScope === 'root'
                ? doc(db, 'users', uid)
                : doc(db, 'artifacts', appId, 'users', uid);
        }

        function usersCollectionRef() {
            return dbScope === 'root'
                ? collection(db, 'users')
                : collection(db, 'artifacts', appId, 'users');
        }

        function attendanceCollectionRef() {
            return dbScope === 'root'
                ? collection(db, 'attendance')
                : collection(db, 'artifacts', appId, 'attendance');
        }

        async function withDbFallback(fn) {
            try {
                return await fn();
            } catch (e) {
                if (e && e.code === 'permission-denied' && dbScope === 'artifacts') {
                    dbScope = 'root';
                    return await fn();
                }
                throw e;
            }
        }

        function showDbAccessError() {
            const errorEl = document.getElementById('login-error');
            if (errorEl) {
                errorEl.innerText = "資料庫存取權限不足（請確認 Firestore Rules 與資料路徑），目前以有限模式進入";
                errorEl.classList.remove('hidden');
            }
        }

        async function safeGetUserData(user) {
            try {
                const userDoc = await withDbFallback(() => getDoc(userDocRef(user.uid)));
                return userDoc.exists() ? userDoc.data() : null;
            } catch (e) {
                if (e && e.code === 'permission-denied') {
                    hasDbAccess = false;
                    return null;
                }
                throw e;
            }
        }

        async function safeSetUserData(uid, data, options = { merge: true }) {
            try {
                await withDbFallback(() => setDoc(userDocRef(uid), data, options));
                return true;
            } catch (e) {
                if (e && e.code === 'permission-denied') {
                    hasDbAccess = false;
                    return false;
                }
                throw e;
            }
        }

        async function safeAddAttendance(data) {
            try {
                await withDbFallback(() => addDoc(attendanceCollectionRef(), data));
                return true;
            } catch (e) {
                if (e && e.code === 'permission-denied') {
                    hasDbAccess = false;
                    return false;
                }
                throw e;
            }
        }

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const rememberMe = Boolean(document.getElementById('remember-me')?.checked);
            if (!email || !password) {
                errorEl.innerText = "請輸入 Email 與密碼";
                errorEl.classList.remove('hidden');
                return;
            }
            try {
                errorEl.classList.add('hidden');
                await setPersistence(auth, rememberMe ? browserLocalPersistence : browserSessionPersistence);
                if (rememberMe) {
                    localStorage.setItem(LOGIN_PREF_KEY, JSON.stringify({ rememberMe: true, email }));
                } else {
                    localStorage.setItem(LOGIN_PREF_KEY, JSON.stringify({ rememberMe: false }));
                }
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                errorEl.innerText = "驗證失敗，請檢查帳密";
                errorEl.classList.remove('hidden');
            }
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());

        function applyProfileUI(user, userData) {
            const name = (userData && userData.name) ? userData.name : ((user && user.displayName) ? user.displayName : '');
            const role = (userData && userData.role) ? userData.role : '';
            const email = (userData && userData.email) ? userData.email : ((user && user.email) ? user.email : '');
            const uid = (userData && userData.uid) ? userData.uid : ((user && user.uid) ? user.uid : '');
            const avatarDataUrl = (userData && userData.avatarDataUrl) ? userData.avatarDataUrl : '';
            const photoURL = (user && user.photoURL) ? user.photoURL : ((userData && userData.photoURL) ? userData.photoURL : '');
            let localAvatar = '';
            try {
                localAvatar = uid ? (localStorage.getItem(`${PROFILE_AVATAR_KEY_PREFIX}${uid}`) || '') : '';
            } catch {
                localAvatar = '';
            }

        window.handleProfileAvatarSelected = async (e) => {
            const file = e && e.target && e.target.files ? e.target.files[0] : null;
            if (!file) return;
            e.target.value = '';

            const uid = (currentUserData && currentUserData.uid) ? currentUserData.uid : (auth.currentUser && auth.currentUser.uid ? auth.currentUser.uid : '');
            if (!uid) return;
            if (!file.type || !file.type.startsWith('image/')) {
                setProfileStatus('profile-avatar-status', '請選擇圖片檔案', 'error');
                return;
            }
            if (file.size > 3 * 1024 * 1024) {
                setProfileStatus('profile-avatar-status', '圖片太大（請小於 3MB）', 'error');
                return;
            }

            setProfileStatus('profile-avatar-status', '上傳中…', 'muted');
            try {
                const toDataUrl = (blob) =>
                    new Promise((resolve, reject) => {
                        const fr = new FileReader();
                        fr.onload = () => resolve(String(fr.result || ''));
                        fr.onerror = () => reject(fr.error || new Error('read failed'));
                        fr.readAsDataURL(blob);
                    });

                const bitmap = await createImageBitmap(file);
                const side = Math.min(bitmap.width, bitmap.height);
                const sx = Math.floor((bitmap.width - side) / 2);
                const sy = Math.floor((bitmap.height - side) / 2);

                const target = 256;
                const canvas = document.createElement('canvas');
                canvas.width = target;
                canvas.height = target;
                const ctx = canvas.getContext('2d');
                if (!ctx) throw new Error('canvas not supported');
                ctx.drawImage(bitmap, sx, sy, side, side, 0, 0, target, target);
                bitmap.close();

                const tryQualities = [0.88, 0.8, 0.72, 0.65, 0.58];
                let dataUrl = '';
                for (const q of tryQualities) {
                    const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', q));
                    if (!blob) continue;
                    if (blob.size > 650 * 1024) continue;
                    dataUrl = await toDataUrl(blob);
                    if (dataUrl.startsWith('data:image/')) break;
                }

                if (!dataUrl) {
                    setProfileStatus('profile-avatar-status', '圖片仍太大，請換一張較小的圖片', 'error');
                    return;
                }

                setProfileStatus('profile-avatar-status', '儲存中…', 'muted');
                await safeSetUserData(uid, { avatarDataUrl: dataUrl }, { merge: true });
                if (currentUserData) currentUserData.avatarDataUrl = dataUrl;

                try {
                    localStorage.setItem(`${PROFILE_AVATAR_KEY_PREFIX}${uid}`, dataUrl);
                } catch {
                }

                applyProfileUI(auth.currentUser, currentUserData);
                lucide.createIcons();
                setProfileStatus('profile-avatar-status', '已更新大頭照', 'success');
            } catch (err) {
                const code = err && err.code ? String(err.code) : '';
                if (code.includes('permission-denied')) setProfileStatus('profile-avatar-status', '儲存失敗：沒有權限', 'error');
                else setProfileStatus('profile-avatar-status', '儲存失敗，請稍後再試', 'error');
            }
        };

                    if (latEl) latEl.innerText = lat.toFixed(6);

            const nextStatus = currentUserData.shiftStatus === 'in' ? 'out' : 'in';
            const punchType = nextStatus === 'in' ? 'clock_in' : 'clock_out';
            let lat = currentUserData.lastLat;
            let lng = currentUserData.lastLng;

            if (typeof lat !== 'number' || typeof lng !== 'number') {
                await new Promise((resolve) => {
                    if (!navigator.geolocation) return resolve();
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            lat = pos.coords.latitude;
                            lng = pos.coords.longitude;
                            resolve();
                        },
                        () => resolve(),
                        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                    );
                });
            }

            const attendanceOk = await safeAddAttendance({
                uid: currentUserData.uid,
                email: currentUserData.email,
                type: punchType,
                lat: typeof lat === 'number' ? lat : null,
                lng: typeof lng === 'number' ? lng : null,
                createdAt: new Date().toISOString()
            });

            currentUserData = { ...currentUserData, shiftStatus: nextStatus, updatedAt: new Date().toISOString() };
            const userOk = await safeSetUserData(currentUserData.uid, {
                shiftStatus: nextStatus,
                updatedAt: new Date().toISOString()
            }, { merge: true });
            if (!attendanceOk || !userOk) alert("資料庫存取權限不足，無法完成打卡");

            renderActiveTab();
        };

        window.saveProfile = async () => {
            if (!currentUserData) return;
            const name = (document.getElementById('profile-name')?.value || '').trim();
            currentUserData = { ...currentUserData, name, updatedAt: new Date().toISOString() };
            const ok = await safeSetUserData(currentUserData.uid, {
                name,
                updatedAt: new Date().toISOString()
            }, { merge: true });
            if (!ok) alert("資料庫存取權限不足，無法儲存個人資料");
            renderActiveTab();
        };

        window.loadAdminUsers = async () => {
            if (!currentUserData || currentUserData.role !== '系統管理員') return;
            const listEl = document.getElementById('admin-users');
            if (!listEl) return;
            listEl.innerHTML = `
                <div class="p-10 text-center bg-white rounded-[2rem] shadow-sm">
                    <div class="w-12 h-12 border-4 border-red-100 border-t-red-600 rounded-full animate-spin mx-auto"></div>
                    <p class="mt-4 text-gray-400 font-bold tracking-tight">載入中...</p>
                </div>
            `;

            let users = [];
            try {
                const q = query(usersCollectionRef(), orderBy('email'), limit(200));
                const snap = await withDbFallback(() => getDocs(q));
                users = snap.docs.map((d) => d.data());
            } catch (e) {
                if (e && e.code === 'permission-denied') {
                    hasDbAccess = false;
                    listEl.innerHTML = `
                        <div class="p-10 text-center bg-white rounded-[2rem] shadow-sm">
                            <i data-lucide="shield-alert" class="w-12 h-12 text-red-200 mx-auto mb-4"></i>
                            <p class="text-gray-400 font-bold tracking-tight">資料庫存取權限不足，無法載入用戶清單</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }
                throw e;
            }
            const search = (document.getElementById('admin-user-search')?.value || '').trim().toLowerCase();
            const filtered = search
                ? users.filter((u) => String(u.email || '').toLowerCase().includes(search) || String(u.uid || '').toLowerCase().includes(search))
                : users;

            if (filtered.length === 0) {
                listEl.innerHTML = `
                    <div class="p-10 text-center bg-white rounded-[2rem] shadow-sm">
                        <i data-lucide="user-x" class="w-12 h-12 text-red-200 mx-auto mb-4"></i>
                        <p class="text-gray-400 font-bold tracking-tight">找不到用戶</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            listEl.innerHTML = filtered.map((u) => {
                const role = (u && u.role && ROLE_DEFS[u.role]) ? u.role : '保全';
                const disabled = Boolean(u && u.disabled);
                const uid = escapeHtml(u.uid || '');
                const email = escapeHtml(u.email || '(no email)');
                return `
                    <div class="flat-card bg-white p-5 border-none shadow-sm">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex-1 min-w-0">
                                <p class="font-black text-gray-800 truncate">${email}</p>
                                <p class="text-[10px] text-gray-300 font-bold tracking-widest mt-1 truncate">${uid}</p>
                                <div class="mt-3 flex items-center gap-2">
                                    <span class="text-xs font-black ${disabled ? 'text-red-600' : 'text-gray-400'}">${disabled ? '已停用' : '啟用中'}</span>
                                    <span class="text-xs font-black text-gray-300">•</span>
                                    <span class="text-xs font-black text-gray-400">${escapeHtml(role)}</span>
                                </div>
                            </div>
                            <div class="w-28">
                                <select id="role-${uid}" class="w-full px-3 py-3 bg-gray-100 rounded-2xl text-xs font-black text-gray-700 border-none focus:ring-2 focus:ring-red-500">
                                    ${Object.keys(ROLE_DEFS).map((r) => `<option value="${escapeHtml(r)}" ${r === role ? 'selected' : ''}>${escapeHtml(r)}</option>`).join('')}
                                </select>
                                <button onclick="updateUserRole('${uid}')" class="w-full mt-2 bg-red-600 text-white font-black py-3 rounded-2xl text-xs active:scale-95 transition-transform">
                                    套用
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        };

        window.updateUserRole = async (uid) => {
            if (!currentUserData || currentUserData.role !== '系統管理員') return;
            const selectEl = document.getElementById(`role-${uid}`);
            if (!selectEl) return;
            const role = selectEl.value;
            const level = ROLE_DEFS[role]?.level ?? 1;
            const ok = await safeSetUserData(uid, {
                role,
                level,
                updatedAt: new Date().toISOString()
            }, { merge: true });
            if (!ok) alert("資料庫存取權限不足，無法更新角色");
            await loadAdminUsers();
        };

        async function loadAttendanceHistory(uid) {
            const listEl = document.getElementById('attendance-list');
            if (!listEl) return;

            let rows = [];
            try {
                const q = query(attendanceCollectionRef(), where('uid', '==', uid), orderBy('createdAt', 'desc'), limit(20));
                const snap = await withDbFallback(() => getDocs(q));
                rows = snap.docs.map((d) => d.data());
            } catch (e) {
                if (e && e.code === 'permission-denied') {
                    hasDbAccess = false;
                    listEl.innerHTML = `
                        <div class="p-10 text-center bg-white rounded-[2rem] shadow-sm">
                            <i data-lucide="shield-alert" class="w-12 h-12 text-red-200 mx-auto mb-4"></i>
                            <p class="text-gray-400 font-bold tracking-tight">資料庫存取權限不足，無法載入打卡紀錄</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }
                throw e;
            }

            if (rows.length === 0) {
                listEl.innerHTML = `
                    <div class="p-10 text-center bg-white rounded-[2rem] shadow-sm">
                        <i data-lucide="calendar-x" class="w-12 h-12 text-red-200 mx-auto mb-4"></i>
                        <p class="text-gray-400 font-bold tracking-tight">尚無打卡紀錄</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            listEl.innerHTML = rows.map((r) => {
                const typeLabel = r.type === 'clock_in' ? '上班' : (r.type === 'clock_out' ? '下班' : '打卡');
                const createdAt = escapeHtml(r.createdAt || '');
                const lat = typeof r.lat === 'number' ? r.lat.toFixed(5) : '--';
                const lng = typeof r.lng === 'number' ? r.lng.toFixed(5) : '--';
                return `
                    <div class="flat-card bg-white p-5 border-none shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="font-black text-gray-800">${typeLabel}打卡</p>
                                <p class="text-xs text-gray-400 font-bold mt-1">${createdAt}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-gray-300 font-black tracking-widest">LAT ${lat}</p>
                                <p class="text-[10px] text-gray-300 font-black tracking-widest mt-1">LNG ${lng}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        }
    </script>
</body>
</html>
